<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا - دليل فعاليات الجامعة</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<!-- ================= NAVBAR ================= -->
<header>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-calendar-alt me-2"></i>
                دليل فعاليات الجامعة
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-2">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">الفعاليات</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">عن الدليل</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="contact.html">اتصل بنا</a>
                    </li>

                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm ms-2"
                            id="darkModeToggle"
                            aria-label="تبديل الوضع الليلي">
                            <i class="fas fa-moon"></i>
                        </button>
                    </li>

                </ul>
            </div>

        </div>
    </nav>
</header>
<body>

<!-- ================= MAIN ================= -->
<main class="main-content py-5">

    <div class="container">

        <!-- HEADER -->
        <div class="row align-items-center mb-5">

            <div class="col-lg-6">
                <h1 class="display-5 fw-bold text-gradient mb-3">
                    اتصل بنا
                </h1>
                <p class="lead text-muted">
                    عندك سؤال؟ اقتراح؟ نحن جاهزين نسمعك 🤍
                </p>
            </div>

            <div class="col-lg-6 text-center">
                <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=600"
                    class="img-fluid rounded-4 shadow-lg"
                    alt="support team">
            </div>

        </div>

        <!-- CONTENT -->
        <div class="row g-5">

            <!-- FORM -->
            <div class="col-lg-8">

                <div class="card p-5 shadow-lg border-0 rounded-4">

                    <h3 class="fw-bold mb-4">
                        <i class="fas fa-paper-plane text-primary me-2"></i>
                        أرسل رسالة
                    </h3>

                    <form id="contactForm">

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label">الاسم</label>
                                <input type="text" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">الإيميل</label>
                                <input type="email" class="form-control" required>
<div id="emailError" class="invalid-feedback">
        ⚠️ الرجاء إدخال إيميل صحيح (مثال: name@email.com)
    </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label">الموضوع</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="col-12">
                                <label class="form-label">الرسالة</label>
                                <textarea rows="6" class="form-control" required></textarea>
                            </div>

                            <div class="col-12">
                                <button class="btn btn-primary px-5 py-2">
                                    إرسال
                                    <i class="fas fa-arrow-left ms-2"></i>
                                </button>
                            </div>

                        </div>

                    </form>

                    <!-- نجاح الإرسال -->
                    <div id="successMsg" class="alert alert-success mt-4 d-none">
                        تم إرسال رسالتك بنجاح 🤍
                    </div>

                </div>

            </div>

            <!-- INFO -->
            <div class="col-lg-4">

                <div class="card p-4 shadow-lg border-0 rounded-4 h-100">

                    <h4 class="fw-bold text-primary mb-4">
                        معلومات التواصل
                    </h4>

                    <p><i class="fas fa-envelope text-primary me-2"></i> events@university.edu.sa</p>
                    <p><i class="fas fa-phone text-success me-2"></i> +966 50 123 4567</p>
                    <p><i class="fas fa-clock text-warning me-2"></i> 9 AM - 5 PM</p>
                    <p><i class="fas fa-map-marker-alt text-danger me-2"></i> جامعة اليس</p>

                    <hr>

                    <!-- Social -->
                    <div class="d-flex gap-3 justify-content-center">

                        <a class="btn btn-outline-primary btn-sm" href="#">
                            <i class="fab fa-facebook"></i>
                        </a>

                        <a class="btn btn-outline-info btn-sm" href="#">
                            <i class="fab fa-twitter"></i>
                        </a>

                        <a class="btn btn-outline-danger btn-sm" href="#">
                            <i class="fab fa-instagram"></i>
                        </a>

                        <a class="btn btn-outline-success btn-sm" href="#">
                            <i class="fab fa-whatsapp"></i>
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>
<button class="scroll-top-btn show" id="scrollTopBtn"><i class="fas fa-chevron-up"></i></button>
</main>

<!-- ================= JS ================= -->
<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
    e.preventDefault();

    const msg = document.getElementById("successMsg");
    msg.classList.remove("d-none");

    setTimeout(() => {
        msg.classList.add("d-none");
    }, 3000);

    this.reset();
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
